<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        h2 { text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .link { text-align: center; margin-top: 15px; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <h2>로그인</h2>
    <input type="text" id="nickname" placeholder="닉네임" required>
    <input type="password" id="password" placeholder="비밀번호" required>
    <button onclick="login()">로그인</button>
    <div class="link">
        <a href="/api/v1/auth/join">회원가입 하러가기</a>
    </div>
</div>

<script>
    async function login() {
        const nickname = document.getElementById('nickname').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch('/api/v1/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nickname: nickname, password: password })
            });

            if (response.ok) {
                // 백엔드가 성공(200 OK)을 보냈을 때
                alert('로그인 성공! 이동합니다.');

                // 👇 여기가 핵심입니다! 가고자 하는 정확한 주소를 적어주세요.
                // 만약 /api/v1/travel/search 로 가고 싶다면 아래처럼 적습니다.
                window.location.href = '/api/v1/travel/search';

            } else {
                // 비밀번호가 틀렸거나 등등의 이유로 백엔드가 에러를 보냈을 때
                const errorText = await response.text();
                alert(errorText || '로그인에 실패했습니다.');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('자바스크립트 통신 에러! F12 콘솔창을 확인하세요.');
        }
    }
</script>

</body>
</html>
