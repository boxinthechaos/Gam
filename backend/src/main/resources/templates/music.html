<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>GAM 플레이리스트 테스트</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f9f9f9; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        .flex-auto { flex: 1; } /* 남은 공간을 채우기 위한 클래스 */
        button { padding: 10px 20px; background-color: #ff0000; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; white-space: nowrap;}
        button:hover { background-color: #cc0000; }
        .song-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; flex-direction: column; gap: 5px; }
        .song-item:last-child { border-bottom: none; }
        .song-title { font-size: 1.1em; font-weight: bold; color: #333; text-decoration: none; }
        .song-title:hover { color: #ff0000; text-decoration: underline; }
        .song-info { color: #666; font-size: 0.9em; margin-top: 5px; }
        #loading { text-align: center; display: none; color: #666; font-weight: bold; margin: 20px 0; }
        .summary { margin-bottom: 20px; padding: 15px; background: #fff3f3; border-radius: 5px; text-align: center; font-weight: bold; color: #d32f2f; border: 1px solid #ffcdd2;}
    </style>
</head>
<body>
<div class="container">
    <h1>🎵 GAM 플레이리스트 생성기</h1>

    <div class="input-group">
        <select id="searchType">
            <option value="artist">가수 이름</option>
        </select>
        <input type="text" id="keyword" class="flex-auto" placeholder="검색어 입력 (예: 에스파)" value="">
        <input type="number" id="minutes" placeholder="분" value="30" style="width: 70px;">
        <button onclick="getPlaylist()">만들기</button>
    </div>

    <div id="loading">⏳ 스포티파이에서 열심히 음악을 찾고 있습니다...</div>
    <div id="save-section" style="display: none; margin-top: 20px; padding: 15px; border: 1px dashed #ccc; border-radius: 10px; background-color: #fff;">
        <input type="text" id="playlist-title" placeholder="플레이리스트 제목을 입력하세요" style="width: 65%; margin-bottom: 10px;">
        <button onclick="savePlaylist()" style="background-color: #4CAF50; width: 30%;">저장하기 💾</button>
    </div>
    <div id="result"></div>
</div>

<script>
    let currentPlaylistData = [];

    async function getPlaylist() {
        const minutes = document.getElementById('minutes').value;
        const searchType = document.getElementById('searchType').value;
        const keyword = document.getElementById('keyword').value;
        const resultDiv = document.getElementById('result');
        const loadingDiv = document.getElementById('loading');


        // 💡 1. 검색어 빈 값 체크
        if (!keyword.trim()) {
            alert("검색어를 입력해주세요!");
            document.getElementById('keyword').focus();
            return;
        }

        const englishOnlyRegex = /^[a-zA-Z0-9\s\-_,]+$/;
        if (!englishOnlyRegex.test(keyword)) {
            alert("검색어는 영어, 숫자, 쉼표(,)만 입력 가능합니다! \n(예: BTS, NewJeans, aespa)");
            document.getElementById('keyword').focus();
            return;
        }

        // 💡 3. 시간 체크
        if (!minutes) {
            alert("시간(분)을 입력해주세요!");
            return;
        }

        resultDiv.innerHTML = '';
        loadingDiv.style.display = 'block';
        document.getElementById('save-section').style.display = 'none';

        try {
            // 💡 fetch URL 수정: searchType과 keyword 파라미터 전달
            const url = `http://localhost:8080/api/v1/music/recommend?minutes=${minutes}&searchType=${searchType}&keyword=${encodeURIComponent(keyword)}`;
            const response = await fetch(url);

            if (!response.ok) {
                throw new Error('서버 에러가 발생했습니다.');
            }

            const data = await response.json();
            loadingDiv.style.display = 'none';
            currentPlaylistData = data;

            if (data.length === 0) {
                resultDiv.innerHTML = '<p style="text-align:center;">조건에 맞는 노래가 없습니다.</p>';
                return;
            }

            document.getElementById('save-section').style.display = 'block';
            let totalMs = 0;

            const summaryDiv = document.createElement('div');
            summaryDiv.className = 'summary';
            resultDiv.appendChild(summaryDiv);

            data.forEach((song, index) => {
                totalMs += song.durationMs;

                const totalSeconds = Math.floor(song.durationMs / 1000);
                const mins = Math.floor(totalSeconds / 60);
                const secs = totalSeconds % 60;

                const songDiv = document.createElement('div');
                songDiv.className = 'song-item';
                songDiv.innerHTML = `
                        <a class="song-title" href="${song.spotifyUrl}" target="_blank">
                            ${index + 1}. ${song.title}
                        </a>
                        <div class="song-info">🎤 ${song.artist} &nbsp;|&nbsp; ⏱️ ${mins}분 ${secs}초</div>
                    `;
                resultDiv.appendChild(songDiv);
            });

            const totalSecs = Math.floor(totalMs / 1000);
            const totalMins = Math.floor(totalSecs / 60);
            const remainSecs = totalSecs % 60;
            summaryDiv.innerHTML = `🎉 총 ${data.length}곡이 담겼습니다! (총 재생 시간: ${totalMins}분 ${remainSecs}초)`;

        } catch (error) {
            loadingDiv.style.display = 'none';
            alert("에러: " + error.message + "\n\n스프링 서버가 켜져 있는지 확인해주세요!");
        }
    }

    // savePlaylist() 함수는 기존과 완벽히 동일하므로 그대로 두시면 됩니다!
    async function savePlaylist() {
        const titleInput = document.getElementById('playlist-title');
        const title = titleInput.value;

        if (!title) {
            alert("플레이리스트 제목을 입력해주세요!");
            return;
        }

        const data = {
            title: title,
            songs: currentPlaylistData
        };

        try {
            const response = await fetch('http://localhost:8080/api/v1/music/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                const result = await response.text();
                alert("✅ " + result);
            } else if (response.status === 401) {
                alert("❌ 로그인이 필요합니다.");
            } else {
                const errorText = await response.text();
                alert("❌ 저장 실패: " + errorText);
            }
        } catch (error) {
            console.error("Error:", error);
            alert("서버와 통신 중 오류가 발생했습니다.");
        }
    }
</script>
</body>
</html>
